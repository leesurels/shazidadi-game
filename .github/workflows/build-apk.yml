name: Build Android APK

on:
  push:
    branches:
      - main        # 推送到 main 分支时触发
    tags:
      - 'v*'        # 推送版本标签（如 v1.0.0）时也触发
  workflow_dispatch:  # 也支持手动触发

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 安装 npm 依赖
      - name: Install dependencies
        run: npm install

      # 4. 构建 Next.js 静态文件
      - name: Build Next.js (static export)
        run: npm run build

      # 5. 设置 Java 环境（Android 构建需要）
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 6. 安装 Capacitor CLI 并初始化 Android 项目
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      # 7. 添加 Android 平台
      - name: Add Android platform
        run: npx cap add android

      # 8. 同步 Web 资源到 Android 项目
      - name: Capacitor sync
        run: npx cap sync android

      # 9. 设置 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 10. 赋予 Gradle 执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      # 11. 构建 Debug APK（无需签名，可直接安装）
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      # 12. 上传 APK 为 Artifact（每次构建都保存）
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shazidadi-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 13. 如果是版本标签推送，自动创建 Release 并附上 APK
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: 傻子大帝 ${{ github.ref_name }}
          body: |
            ## 傻子大帝 ${{ github.ref_name }}

            ### 安装说明
            1. 下载 `app-debug.apk`
            2. 在 Android 设备上开启「允许未知来源安装」
            3. 安装并游戏！

            > ⚠️ 这是 Debug 版本，仅供测试使用。
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
